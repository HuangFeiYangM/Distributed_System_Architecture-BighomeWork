apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-canteen-web
  namespace: canteen-offline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-canteen-web
  template:
    metadata:
      labels:
        app: smart-canteen-web
    spec:
      containers:
        - name: smart-canteen-web
          image: smart-canteen-web:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: smart-canteen-web
  namespace: canteen-offline
spec:
  type: NodePort
  selector:
    app: smart-canteen-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30173
