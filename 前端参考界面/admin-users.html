<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能食堂 - 用户管理</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
<style>
body { margin:0; font-family:'Helvetica Neue',Helvetica,'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f7fa; }
.header { background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.05); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
.header-left { display:flex; align-items:center; gap:12px; font-size:18px; font-weight:600; color:#303133; }
.main { max-width:1100px; margin:24px auto; padding:0 24px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">🍽️ 智能食堂 <el-tag size="small" type="danger" style="margin-left:8px">管理员</el-tag></div>
    <div>
      <el-button text @click="goWindows">🏪 窗口管理</el-button>
      <el-button text @click="logout">退出</el-button>
    </div>
  </div>

  <div class="main">
    <h2 style="color:#303133;margin-bottom:16px;">👥 用户列表</h2>
    <el-card shadow="never">
      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <el-input v-model="search" placeholder="搜索手机号/昵称/学工号" style="width:280px" clearable prefix-icon="Search"></el-input>
        <el-select v-model="roleFilter" placeholder="角色筛选" clearable style="width:140px">
          <el-option label="普通用户" :value="0"></el-option>
          <el-option label="商家" :value="1"></el-option>
          <el-option label="管理员" :value="2"></el-option>
        </el-select>
      </div>
      <el-table :data="filteredUsers" stripe size="large">
        <el-table-column prop="id" label="ID" width="70" />
        <el-table-column prop="phone" label="手机号" width="130" />
        <el-table-column prop="studentNo" label="学工号" width="130" />
        <el-table-column prop="nickname" label="昵称" min-width="140" />
        <el-table-column label="角色" width="100">
          <template #default="{row}">
            <el-tag :type="row.role===2?'danger':row.role===1?'warning':'info'">{{roleText(row.role)}}</el-tag>
          </template>
        </el-table-column>
        <el-table-column label="状态" width="90">
          <template #default="{row}">
            <el-tag :type="row.status===1?'success':'info'">{{row.status===1?'正常':'禁用'}}</el-tag>
          </template>
        </el-table-column>
        <el-table-column label="操作" width="140" fixed="right">
          <template #default="{row}">
            <el-button size="small" @click="editRole(row)">改角色</el-button>
          </template>
        </el-table-column>
      </el-table>
      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <el-pagination background layout="prev, pager, next" :total="filteredUsers.length" :page-size="10"></el-pagination>
      </div>
    </el-card>
  </div>

  <el-dialog v-model="dialogVisible" title="修改角色" width="360px" align-center>
    <div style="margin-bottom:12px;">用户：{{currentUser.nickname}}（{{currentUser.phone}}）</div>
    <el-select v-model="newRole" placeholder="选择角色" style="width:100%">
      <el-option label="普通用户" :value="0"></el-option>
      <el-option label="商家" :value="1"></el-option>
      <el-option label="管理员" :value="2"></el-option>
    </el-select>
    <template #footer>
      <el-button @click="dialogVisible=false">取消</el-button>
      <el-button type="primary" @click="saveRole">保存</el-button>
    </template>
  </el-dialog>
</div>
<script>
const { createApp, ref, computed } = Vue;
const { ElMessage } = ElementPlus;
createApp({
  setup() {
    const users = ref([
      { id:1, phone:'13800000000', studentNo:'ADMIN001', nickname:'系统管理员', role:2, status:1 },
      { id:2, phone:'13800000001', studentNo:'MERCHANT001', nickname:'1号档口老板', role:1, status:1 },
      { id:3, phone:'13800000002', studentNo:'2024001001', nickname:'测试学生', role:0, status:1 },
      { id:4, phone:'13800138000', studentNo:'2024001002', nickname:'张三', role:0, status:1 },
      { id:5, phone:'13912345678', studentNo:'2024001003', nickname:'李四', role:0, status:1 },
      { id:6, phone:'13787654321', studentNo:'MERCHANT002', nickname:'2号档口老板', role:1, status:1 },
    ]);
    const search = ref('');
    const roleFilter = ref('');
    const dialogVisible = ref(false);
    const currentUser = ref({});
    const newRole = ref(0);

    const roleText = (r) => ({0:'普通用户',1:'商家',2:'管理员'}[r]||'未知');
    const filteredUsers = computed(() => {
      return users.value.filter(u => {
        const matchSearch = !search.value || u.phone.includes(search.value) || u.nickname.includes(search.value) || u.studentNo.includes(search.value);
        const matchRole = roleFilter.value==='' || u.role===roleFilter.value;
        return matchSearch && matchRole;
      });
    });
    const editRole = (row) => { currentUser.value=row; newRole.value=row.role; dialogVisible.value=true; };
    const saveRole = () => { currentUser.value.role=newRole.value; dialogVisible.value=false; ElMessage.success('角色修改成功'); };
    const goWindows = () => location.href='admin-windows.html';
    const logout = () => { ElMessage.success('已退出'); setTimeout(()=>location.href='login.html',400); };
    return { users, search, roleFilter, dialogVisible, currentUser, newRole, roleText, filteredUsers, editRole, saveRole, goWindows, logout };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
