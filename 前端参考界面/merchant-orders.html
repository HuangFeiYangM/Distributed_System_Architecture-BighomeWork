<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能食堂 - 商家工作台</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
<style>
body { margin:0; font-family:'Helvetica Neue',Helvetica,'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f7fa; }
.header { background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.05); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
.header-left { display:flex; align-items:center; gap:12px; font-size:18px; font-weight:600; color:#303133; }
.main { max-width:1200px; margin:24px auto; padding:0 24px; }
.card-header { display:flex; justify-content:space-between; align-items:center; }
.pickup-no { font-size:28px; font-weight:800; color:#409EFF; letter-spacing:4px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">🍽️ 智能食堂 <el-tag size="small" type="warning" style="margin-left:8px">商家端</el-tag></div>
    <div>
      <el-button text @click="goDishes">🍲 菜品管理</el-button>
      <el-button text @click="goPublish">📅 发布菜单</el-button>
      <el-button text @click="logout">退出</el-button>
    </div>
  </div>

  <div class="main">
    <el-row :gutter="16" style="margin-bottom:20px;">
      <el-col :span="6"><el-statistic title="今日订单" :value="stats.total" /></el-col>
      <el-col :span="6"><el-statistic title="待接单" :value="stats.pending" /></el-col>
      <el-col :span="6"><el-statistic title="待取餐" :value="stats.ready" /></el-col>
      <el-col :span="6"><el-statistic title="已核销" :value="stats.picked" /></el-col>
    </el-row>

    <el-card shadow="never" style="margin-bottom:16px;">
      <template #header>
        <div class="card-header">
          <span style="font-weight:600;">📢 叫号与核销面板</span>
          <el-button type="primary" @click="callNext" :disabled="queue.length===0">叫号</el-button>
        </div>
      </template>
      <div v-if="currentCall" style="text-align:center;padding:20px;background:#ecf5ff;border-radius:8px;margin-bottom:16px;">
        <div style="font-size:14px;color:#606266;margin-bottom:8px;">当前叫号</div>
        <div class="pickup-no">{{currentCall.pickupNo}}</div>
        <div style="margin-top:8px;color:#409EFF;font-size:14px;">{{currentCall.orderNo}} | 取餐码 {{currentCall.pickupCode}}</div>
      </div>
      <div v-else style="text-align:center;padding:20px;color:#909399;">暂无叫号，点击上方"叫号"按钮</div>

      <el-form inline style="justify-content:center;margin-top:12px;">
        <el-form-item label="输入取餐码核销">
          <el-input v-model="verifyCode" placeholder="6位取餐码" maxlength="6" style="width:180px;"></el-input>
        </el-form-item>
        <el-form-item>
          <el-button type="success" @click="verifyPickup" :disabled="!verifyCode">核销取餐</el-button>
        </el-form-item>
      </el-form>
    </el-card>

    <h3 style="color:#303133;margin-bottom:12px;">🧾 订单流转管理</h3>
    <el-table :data="orders" stripe style="width:100%;background:#fff;border-radius:8px;" size="large">
      <el-table-column prop="orderNo" label="订单号" width="160" />
      <el-table-column label="菜品" min-width="200">
        <template #default="{row}">
          <div v-for="item in row.items" :key="item.menuDishId">{{item.name}} × {{item.quantity}}</div>
        </template>
      </el-table-column>
      <el-table-column prop="totalAmount" label="金额" width="100">
        <template #default="{row}">¥{{row.totalAmount.toFixed(2)}}</template>
      </el-table-column>
      <el-table-column label="状态" width="120">
        <template #default="{row}">
          <el-tag :type="statusType(row.status)">{{statusText(row.status)}}</el-tag>
        </template>
      </el-table-column>
      <el-table-column prop="pickupCode" label="取餐码" width="100" />
      <el-table-column label="操作" width="220" fixed="right">
        <template #default="{row}">
          <el-button v-if="row.status===0" size="small" type="primary" @click="updateStatus(row,1)">接单</el-button>
          <el-button v-if="row.status===1" size="small" type="warning" @click="updateStatus(row,2)">制作</el-button>
          <el-button v-if="row.status===2" size="small" type="success" @click="updateStatus(row,3)">完成</el-button>
          <el-button v-if="row.status===3" size="small" type="info" disabled>待取餐</el-button>
          <el-button v-if="row.status===4" size="small" type="success" plain disabled>已取餐</el-button>
        </template>
      </el-table-column>
    </el-table>
  </div>
</div>
<script>
const { createApp, ref, reactive } = Vue;
const { ElMessage } = ElementPlus;
createApp({
  setup() {
    const stats = reactive({ total:12, pending:2, ready:3, picked:7 });
    const orders = ref([
      { id:10001, orderNo:'O202604300001', status:0, totalAmount:30.00, pickupCode:'384756', items:[{ menuDishId:1, name:'宫保鸡丁', quantity:2 }] },
      { id:10002, orderNo:'O202604300002', status:1, totalAmount:12.00, pickupCode:'482913', items:[{ menuDishId:2, name:'糖醋里脊', quantity:1 }] },
      { id:10003, orderNo:'O202604300003', status:2, totalAmount:18.00, pickupCode:'759102', items:[{ menuDishId:5, name:'红烧牛肉面', quantity:1 }] },
      { id:10004, orderNo:'O202604300004', status:3, totalAmount:24.00, pickupCode:'102938', items:[{ menuDishId:1, name:'宫保鸡丁', quantity:1 },{ menuDishId:3, name:'麻婆豆腐', quantity:1 }] },
      { id:10005, orderNo:'O202604300005', status:3, totalAmount:15.00, pickupCode:'564738', items:[{ menuDishId:1, name:'宫保鸡丁', quantity:1 }] },
      { id:10006, orderNo:'O202604300006', status:4, totalAmount:10.00, pickupCode:'291045', items:[{ menuDishId:6, name:'扬州炒饭', quantity:1 }] },
    ]);
    const queue = ref([
      { orderId:10004, orderNo:'O202604300004', pickupCode:'102938', pickupNo:'A001' },
      { orderId:10005, orderNo:'O202604300005', pickupCode:'564738', pickupNo:'A002' },
    ]);
    const currentCall = ref(null);
    const verifyCode = ref('');
    let callSeq = 2;

    const statusMap = {
      0: { text:'已下单', type:'info' },
      1: { text:'已接单', type:'primary' },
      2: { text:'制作中', type:'warning' },
      3: { text:'待取餐', type:'danger' },
      4: { text:'已取餐', type:'success' },
    };
    const statusText = (s) => statusMap[s]?.text || '未知';
    const statusType = (s) => statusMap[s]?.type || 'info';

    const updateStatus = (row, newStatus) => {
      row.status = newStatus;
      if(newStatus===3) {
        callSeq++;
        queue.value.push({ orderId:row.id, orderNo:row.orderNo, pickupCode:row.pickupCode, pickupNo:'A'+String(callSeq).padStart(3,'0') });
        stats.ready++;
        stats.pending--;
      }
      if(newStatus===1) { stats.pending--; }
      ElMessage.success(`订单 ${row.orderNo} 已更新为「${statusText(newStatus)}」`);
    };

    const callNext = () => {
      if(queue.value.length===0) return;
      currentCall.value = queue.value.shift();
      ElMessage.success(`叫号：${currentCall.value.pickupNo}`);
    };

    const verifyPickup = () => {
      const order = orders.value.find(o=>o.pickupCode===verifyCode.value && o.status===3);
      if(!order){ ElMessage.error('取餐码无效或订单状态不符'); return; }
      order.status=4;
      stats.ready--;
      stats.picked++;
      ElMessage.success(`核销成功：${order.orderNo}`);
      verifyCode.value='';
      if(currentCall.value && currentCall.value.pickupCode===order.pickupCode) currentCall.value=null;
    };

    const goDishes = () => location.href='merchant-dishes.html';
    const goPublish = () => location.href='merchant-publish.html';
    const logout = () => { ElMessage.success('已退出'); setTimeout(()=>location.href='login.html',400); };

    return { stats, orders, queue, currentCall, verifyCode, statusText, statusType, updateStatus, callNext, verifyPickup, goDishes, goPublish, logout };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
