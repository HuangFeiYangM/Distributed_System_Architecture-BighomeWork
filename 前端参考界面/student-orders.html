<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能食堂 - 我的订单</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
<style>
body { margin:0; font-family:'Helvetica Neue',Helvetica,'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f7fa; }
.header { background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.05); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
.header-left { display:flex; align-items:center; gap:12px; font-size:18px; font-weight:600; color:#303133; }
.main { max-width:1000px; margin:24px auto; padding:0 24px; }
.status-tag { border-radius:12px; padding:2px 10px; font-size:12px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">🍽️ 智能食堂 <el-tag size="small" type="success" style="margin-left:8px">学生端</el-tag></div>
    <div>
      <el-button text @click="goMenu">🍱 今日菜单</el-button>
      <el-button text @click="logout">退出</el-button>
    </div>
  </div>

  <div class="main">
    <h2 style="margin-bottom:20px;color:#303133;">📋 我的订单</h2>
    <el-card v-for="o in orders" :key="o.id" style="margin-bottom:16px;" shadow="hover">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div style="font-size:16px;font-weight:600;color:#303133;">订单号：{{o.orderNo}}</div>
          <div style="font-size:12px;color:#909399;margin-top:4px;">{{o.createTime}} &nbsp;|&nbsp; {{o.windowName}}</div>
        </div>
        <el-tag :type="statusType(o.status)" class="status-tag">{{statusText(o.status)}}</el-tag>
      </div>
      <el-divider style="margin:8px 0;" />
      <div v-for="item in o.items" :key="item.menuDishId" style="display:flex;justify-content:space-between;padding:6px 0;">
        <span style="color:#606266;">{{item.name}} × {{item.quantity}}</span>
        <span style="color:#606266;">¥{{(item.price*item.quantity).toFixed(2)}}</span>
      </div>
      <el-divider style="margin:8px 0;" />
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:#909399;">
          取餐码：<span style="font-weight:700;color:#409EFF;font-size:14px;">{{o.pickupCode}}</span>
        </div>
        <div style="font-size:18px;font-weight:700;color:#f56c6c;">合计 ¥{{o.totalAmount.toFixed(2)}}</div>
      </div>
      <div style="margin-top:12px;text-align:right;" v-if="o.status===0">
        <el-button size="small" type="danger" plain @click="cancelOrder(o)">取消订单</el-button>
      </div>
    </el-card>

    <el-empty v-if="orders.length===0" description="暂无订单"></el-empty>
  </div>
</div>
<script>
const { createApp, ref } = Vue;
const { ElMessage } = ElementPlus;
createApp({
  setup() {
    const orders = ref([
      { id:10001, orderNo:'O202604300001', status:3, totalAmount:30.00, pickupCode:'384756', createTime:'2026-04-30 11:20:33', windowName:'1号档口-盖浇饭',
        items:[{ menuDishId:1, name:'宫保鸡丁', quantity:2, price:15.00 }] },
      { id:10002, orderNo:'O202604300002', status:1, totalAmount:12.00, pickupCode:'482913', createTime:'2026-04-30 11:45:10', windowName:'2号档口-面食',
        items:[{ menuDishId:2, name:'糖醋里脊', quantity:1, price:12.00 }] },
      { id:10003, orderNo:'O202604290015', status:4, totalAmount:18.00, pickupCode:'759102', createTime:'2026-04-29 12:05:22', windowName:'1号档口-盖浇饭',
        items:[{ menuDishId:5, name:'红烧牛肉面', quantity:1, price:18.00 }] },
      { id:10004, orderNo:'O202604290018', status:5, totalAmount:7.00, pickupCode:'—', createTime:'2026-04-29 12:30:05', windowName:'3号档口-小炒',
        items:[{ menuDishId:4, name:'番茄炒蛋', quantity:1, price:7.00 }] },
    ]);
    const statusMap = {
      0: { text:'已下单', type:'info' },
      1: { text:'已接单', type:'primary' },
      2: { text:'制作中', type:'warning' },
      3: { text:'待取餐', type:'danger' },
      4: { text:'已取餐', type:'success' },
      5: { text:'已取消', type:'info' },
    };
    const statusText = (s) => statusMap[s]?.text || '未知';
    const statusType = (s) => statusMap[s]?.type || 'info';
    const cancelOrder = (o) => { o.status=5; ElMessage.success('订单已取消'); };
    const goMenu = () => location.href='student-today.html';
    const logout = () => { ElMessage.success('已退出'); setTimeout(()=>location.href='login.html',400); };
    return { orders, statusText, statusType, cancelOrder, goMenu, logout };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
